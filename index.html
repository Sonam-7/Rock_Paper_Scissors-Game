<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock,Paper,Scissors Game</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container text-center mt-3">
    <h1 class="mb-2">Rock Paper Scissors Game</h1>
    <div class="d-flex justify-content-center gap-4">
      <div class="choices"> 

        <div class="choice btn btn-primary p-3 " id="rock">   
          <img src="./images/rock.png"/>
        </div>
        
        <div class="choice btn btn-success p-3" id="paper">
          <img src="./images/paper.png" />
        </div>
        
        <div class="choice btn btn-danger p-3" id="scissors">
          <img src="./images/scissors.png" />
        </div>

      </div>
    </div>

    <div class="score-board">
     <div class="score">
        <p id="user-score">0</p>
        <!-- <p>You</p> -->
         <p id="player-label">You</p>

      </div>

       <div class="score">
         <p id="comp-score">0</p>
         <p>Comp</p>
       </div>
    </div>
    <div class="msg-container">
      <p id="msg">Play your move</p>
    </div>

    <!-- reset btn -->
    <button class="btn btn-success mt-3" onclick="resetGame()">Reset Game</button>
      <!-- <button class="btn btn-outline-warning btn-lg mt-4"onclick="resetGame()">Reset Game</button> -->
 
      <!-- win sound -->
    <audio id="win-sound" src="images/win.mp3"></audio>

    <!-- add your name -->
    <div class="mt-3">
     <input type="text" id="player-name" placeholder="Enter your name" class="form-control w-50 mx-auto">
    <button class="btn btn-primary mt-2" onclick="saveName()">Start Game</button>
  </div>
</div> 
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body>
</html>
